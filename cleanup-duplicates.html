<!DOCTYPE html>
<html>
<head>
  <title>Cleanup Completions</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    pre { background: #222; padding: 12px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; }
    button { background: #BBFF00; color: #111; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; margin: 8px 4px; }
    button:hover { opacity: 0.8; }
    button.danger { background: #ff5555; color: #fff; }
    input { background: #222; color: #eee; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; font-family: monospace; margin: 4px; }
    .box { margin-bottom: 16px; padding: 12px; background: #1a1a1a; border-radius: 8px; }
  </style>
</head>
<body>
  <h2>Cleanup Completions</h2>

  <div class="box">
    <div style="margin-bottom:8px; color:#BBFF00;">Login:</div>
    <input id="email" placeholder="Email" value="diegomottadev@gmail.com" />
    <input id="pass" type="password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <span id="authStatus" style="color:#555; margin-left:8px;"></span>
  </div>

  <button onclick="listAll()">1. Ver TODAS las completions</button>
  <button class="danger" onclick="deleteById()">2. Eliminar por ID</button>
  <div style="margin-top:8px;">
    <input id="deleteIds" placeholder="IDs a eliminar separados por coma" style="width:500px;" />
  </div>
  <pre id="log">Primero logueate, luego click "Ver TODAS".</pre>

  <script>
    // Init WITHOUT persistence to force server reads
    const app = firebase.initializeApp({
      apiKey: 'AIzaSyA4hUQYcaOfa6048GT_RFGblkLczKvyRhU',
      authDomain: 'gymtrack-d3c1b.firebaseapp.com',
      projectId: 'gymtrack-d3c1b',
      storageBucket: 'gymtrack-d3c1b.firebasestorage.app',
      messagingSenderId: '1043912526777',
      appId: '1:1043912526777:web:e606d213a4ae6e6ab94468'
    }, 'cleanup')
    const db = firebase.firestore(app)
    const auth = firebase.auth(app)
    const log = document.getElementById('log')
    const DAYS = ['Lunes','Martes','Miercoles','Jueves','Viernes','Sabado','Domingo']
    let foundDocs = []

    async function login() {
      const email = document.getElementById('email').value
      const pass = document.getElementById('pass').value
      const status = document.getElementById('authStatus')
      try {
        status.textContent = 'Conectando...'
        const cred = await auth.signInWithEmailAndPassword(email, pass)
        status.textContent = 'OK - UID: ' + cred.user.uid
        status.style.color = '#BBFF00'
      } catch (e) {
        status.textContent = 'Error: ' + e.message
        status.style.color = '#ff5555'
      }
    }

    function getWeekKey(dateStr) {
      const dt = new Date(dateStr + 'T12:00:00')
      const dow = dt.getDay()
      const diff = dow === 0 ? 6 : dow - 1
      const mon = new Date(dt)
      mon.setDate(dt.getDate() - diff)
      return `${mon.getFullYear()}-${String(mon.getMonth()+1).padStart(2,'0')}-${String(mon.getDate()).padStart(2,'0')}`
    }

    function printCompletions(completions, prefix) {
      const sorted = [...completions].sort((a, b) => (a.date || '').localeCompare(b.date || ''))
      for (const c of sorted) {
        log.textContent += `${prefix}ID=${c.id} | ${DAYS[c.dayIndex] || '?'} (day${c.dayIndex}) | fecha=${c.date} | semana=${getWeekKey(c.date)} | objId=${c.objectiveId || '-'} | at=${c.completedAt || '-'}\n`
      }
    }

    async function listAll() {
      const user = auth.currentUser
      if (!user) { log.textContent = 'ERROR: Logueate primero.'; return }

      log.textContent = 'Buscando (forzando lectura del servidor)...\n\n'
      foundDocs = []

      try {
        // 1. sharedObjectives por trainerId
        log.textContent += '=== SHARED OBJECTIVES (trainerId = ' + user.uid + ') ===\n'
        const snap1 = await db.collection('sharedObjectives')
          .where('trainerId', '==', user.uid)
          .get({ source: 'server' })
        log.textContent += `Total docs: ${snap1.docs.length}\n\n`

        for (const doc of snap1.docs) {
          const data = doc.data()
          const completions = data.completions || []
          foundDocs.push({ ref: doc.ref, data, source: 'shared' })
          log.textContent += `  "${data.objective?.name || '?'}" | alumno: ${data.studentEmail} | doc: ${doc.id}\n`
          log.textContent += `  Completions: ${completions.length}\n`
          printCompletions(completions, '    ')
          log.textContent += '\n'
        }

        // 2. user doc del trainer
        log.textContent += '=== USER DATA (users/' + user.uid + ') ===\n'
        const userDoc = await db.collection('users').doc(user.uid).get({ source: 'server' })
        if (userDoc.exists) {
          const data = userDoc.data()
          const completions = data.completions || []
          foundDocs.push({ ref: userDoc.ref, data, source: 'user' })
          log.textContent += `  Completions personales: ${completions.length}\n`
          printCompletions(completions, '    ')
        } else {
          log.textContent += '  Sin documento\n'
        }
        log.textContent += '\n'

        // 3. Listar TODOS los docs de sharedObjectives (por si trainerId no matchea)
        log.textContent += '=== TODOS LOS SHARED OBJECTIVES (sin filtro) ===\n'
        const snapAll = await db.collection('sharedObjectives').get({ source: 'server' })
        log.textContent += `Total docs en coleccion: ${snapAll.docs.length}\n`
        for (const doc of snapAll.docs) {
          const data = doc.data()
          const completions = data.completions || []
          const already = foundDocs.some(d => d.ref.id === doc.id)
          if (!already) foundDocs.push({ ref: doc.ref, data, source: 'shared' })
          log.textContent += `  doc=${doc.id} | trainer=${data.trainerEmail || data.trainerId} | alumno=${data.studentEmail} | completions=${completions.length}\n`
        }
        log.textContent += '\n'

        log.textContent += 'Listo. Si ves IDs que sobran, copialos al campo de abajo.\n'
      } catch (e) {
        log.textContent += `\nERROR: ${e.message}\n`
        log.textContent += 'Stack: ' + e.stack + '\n'
      }
    }

    async function deleteById() {
      const idsStr = document.getElementById('deleteIds').value.trim()
      if (!idsStr) { log.textContent += '\nIngresa IDs.\n'; return }
      const ids = idsStr.split(',').map(s => s.trim()).filter(Boolean)
      log.textContent += `\nEliminando ${ids.length} completion(s)...\n`
      try {
        for (const docInfo of foundDocs) {
          const completions = docInfo.data.completions || []
          const filtered = completions.filter(c => !ids.includes(c.id))
          if (filtered.length < completions.length) {
            const removed = completions.length - filtered.length
            await docInfo.ref.update({ completions: filtered })
            log.textContent += `  ${docInfo.ref.id}: eliminadas ${removed} (${completions.length} -> ${filtered.length})\n`
          }
        }
        log.textContent += 'Listo!\n'
      } catch (e) {
        log.textContent += `ERROR: ${e.message}\n`
      }
    }
  </script>
</body>
</html>
