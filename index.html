<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Gym Tracker</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/recharts@2.8.0/umd/Recharts.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0a0a0a;color:#f0f0f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}
input,select,button,textarea{font-family:inherit;}
input[type=number]::-webkit-inner-spin-button{opacity:.4;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#141414;}
::-webkit-scrollbar-thumb{background:#333;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useMemo,useRef,useCallback}=React;
const {LineChart,Line,BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,CartesianGrid}=window.Recharts||{};

/* ── constantes ───────────────────────────────────────────── */
const KEY="gymtracker_v1";
const A="#BBFF00";
const C={bg:"#0a0a0a",card:"#141414",hi:"#1e1e1e",border:"#252525",muted:"#555",text:"#f0f0f0",danger:"#ff5555"};
const DAY_NAMES=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
const FIREBASE_CONFIG={
  apiKey:"AIzaSyA4hUQYcaOfa6048GT_RFGblkLczKvyRhU",
  authDomain:"gymtrack-d3c1b.firebaseapp.com",
  projectId:"gymtrack-d3c1b",
  storageBucket:"gymtrack-d3c1b.firebasestorage.app",
  messagingSenderId:"1043912526777",
  appId:"1:1043912526777:web:e606d213a4ae6e6ab94468"
};

/* ── helpers ──────────────────────────────────────────────── */
const gid=()=>Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4);
const toDay=()=>new Date().toISOString().slice(0,10);
const EMPTY_DATA={workouts:[],objectives:[],completions:[],reminder:{enabled:false,time:"09:00"}};
const loadLocal=()=>{try{const d=JSON.parse(localStorage.getItem(KEY)||"null")||{};return{workouts:d.workouts||[],objectives:d.objectives||[],completions:d.completions||[],reminder:d.reminder||{enabled:false,time:"09:00"}};}catch{return{...EMPTY_DATA}}};
const persist=d=>localStorage.setItem(KEY,JSON.stringify(d));
const vol=w=>w.exercises.reduce((t,e)=>t+e.sets.reduce((s,st)=>s+(st.w||0)*(st.r||0),0),0);
const fmtDate=d=>new Date(d+"T12:00").toLocaleDateString("es-AR",{weekday:"short",day:"numeric",month:"short"});
const getTodayDayIndex=()=>{const d=new Date().getDay();return d===0?6:d-1;}; // 0=Lunes,...,6=Domingo
function getWeekRange(){
  const now=new Date();const dow=now.getDay();const diff=dow===0?6:dow-1;
  const mon=new Date(now);mon.setDate(now.getDate()-diff);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  return{mon:mon.toISOString().slice(0,10),sun:sun.toISOString().slice(0,10)};
}

function mergeData(local,remote){
  const wMap={};
  (local.workouts||[]).forEach(w=>wMap[w.id]=w);
  (remote.workouts||[]).forEach(w=>wMap[w.id]=w);
  const oMap={};
  (local.objectives||[]).forEach(o=>oMap[o.id]=o);
  (remote.objectives||[]).forEach(o=>oMap[o.id]=o);
  const cMap={};
  (local.completions||[]).forEach(c=>cMap[c.id]=c);
  (remote.completions||[]).forEach(c=>cMap[c.id]=c);
  return{
    workouts:Object.values(wMap).sort((a,b)=>b.date.localeCompare(a.date)),
    objectives:Object.values(oMap),
    completions:Object.values(cMap),
    reminder:remote.reminder||local.reminder||{enabled:false,time:"09:00"}
  };
}

/* ── Notifications ────────────────────────────────────────── */
async function requestNotifPermission(){
  if(!("Notification" in window))return"denied";
  return await Notification.requestPermission();
}
function sendNotification(title,body){
  if("Notification" in window&&Notification.permission==="granted"){
    new Notification(title,{body,icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>"});
  }
}

function getStreak(workouts){
  const days=[...new Set(workouts.map(w=>w.date))].sort().reverse();
  let n=0,cur=toDay();
  for(const d of days){
    if(d===cur){n++;const dt=new Date(d+"T12:00");dt.setDate(dt.getDate()-1);cur=dt.toISOString().slice(0,10);}
    else break;
  }
  return n;
}

function createEmptyObjective(name){
  return{id:gid(),name,createdAt:toDay(),days:DAY_NAMES.map((_,i)=>({dayNumber:i+1,label:"",exercises:[]}))};
}

/* ── Firebase singleton ───────────────────────────────────── */
let _db=null,_uid=null;
async function initFirebase(cfg){
  if(_db)return true;
  try{
    if(!firebase.apps.length)firebase.initializeApp(cfg);
    else firebase.app();
    _db=firebase.firestore();
    try{await _db.enablePersistence();}catch(e){}
    const auth=firebase.auth();
    const cred=await auth.signInAnonymously();
    _uid=cred.user.uid;
    return true;
  }catch(e){console.error("Firebase init error",e);return false;}
}
async function fbLoad(){
  if(!_db||!_uid)return null;
  try{
    const doc=await _db.collection("users").doc(_uid).get();
    return doc.exists?doc.data():null;
  }catch(e){console.error("fbLoad",e);return null;}
}
async function fbSave(data){
  if(!_db||!_uid)return;
  try{await _db.collection("users").doc(_uid).set(data);}
  catch(e){console.error("fbSave",e);}
}

/* ── UI helpers ───────────────────────────────────────────── */
function Card({children,style={},onClick}){
  return <div onClick={onClick} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:16,padding:"16px 20px",marginBottom:12,cursor:onClick?"pointer":"default",...style}}>{children}</div>;
}
function Btn({onClick,children,variant="primary",style={},disabled=false}){
  const v={primary:{background:A,color:"#111"},ghost:{background:"transparent",color:C.muted,border:`1px solid ${C.border}`},danger:{background:"transparent",color:C.danger,border:`1px solid ${C.danger}`}};
  return <button onClick={disabled?undefined:onClick} style={{padding:"10px 20px",borderRadius:10,fontWeight:700,fontSize:14,cursor:disabled?"not-allowed":"pointer",border:"none",transition:"opacity .15s",opacity:disabled?.4:1,...v[variant],...style}}>{children}</button>;
}
function Input({value,onChange,placeholder,type="text",step,min,style={}}){
  return <input type={type} value={value} onChange={onChange} placeholder={placeholder} step={step} min={min}
    style={{width:"100%",background:C.hi,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",color:C.text,fontSize:14,outline:"none",marginBottom:10,...style}}/>;
}
function BackHeader({onBack,title}){
  return <div style={{padding:"24px 20px 16px",display:"flex",alignItems:"center",gap:14}}>
    <button onClick={onBack} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,width:36,height:36,color:C.muted,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
    <div style={{fontSize:20,fontWeight:800}}>{title}</div>
  </div>;
}

/* ── Home ─────────────────────────────────────────────────── */
function HomeView({data,onNewWorkout,onSelectObjective,onUpdateReminder}){
  const streak=useMemo(()=>getStreak(data.workouts),[data.workouts]);
  const todayIdx=getTodayDayIndex();
  const today=toDay();
  const {mon,sun}=useMemo(()=>getWeekRange(),[]);

  const last7=useMemo(()=>{
    const days=[];
    for(let i=6;i>=0;i--){
      const dt=new Date();dt.setDate(dt.getDate()-i);
      const d=dt.toISOString().slice(0,10);
      // Count completions for this day
      const completedCount=data.completions.filter(c=>c.date===d).length;
      const wos=data.workouts.filter(w=>w.date===d);
      const done=completedCount>0||wos.length>0;
      days.push({day:dt.toLocaleDateString("es-AR",{weekday:"short"}).slice(0,3),v:wos.reduce((t,w)=>t+vol(w),0),done,completions:completedCount});
    }
    return days;
  },[data.workouts,data.completions]);
  const maxV=Math.max(...last7.map(d=>d.v),1);

  const todayRoutines=useMemo(()=>{
    return data.objectives.map(obj=>{
      const day=obj.days[todayIdx];
      if(!day||(!day.label&&!day.exercises.length))return null;
      const completed=data.completions.some(c=>c.objectiveId===obj.id&&c.dayIndex===todayIdx&&c.date===today);
      return{obj,day,completed};
    }).filter(Boolean);
  },[data.objectives,data.completions,todayIdx,today]);

  const weekCompletions=useMemo(()=>{
    return data.completions.filter(c=>c.date>=mon&&c.date<=sun).length;
  },[data.completions,mon,sun]);

  const handleToggleReminder=async()=>{
    if(!data.reminder.enabled){
      const perm=await requestNotifPermission();
      if(perm!=="granted"){alert("Necesitás permitir las notificaciones en tu navegador para activar recordatorios.");return;}
      onUpdateReminder({...data.reminder,enabled:true});
    } else {
      onUpdateReminder({...data.reminder,enabled:false});
    }
  };

  return <div>
    <div style={{padding:"24px 20px 8px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
      <div>
        <div style={{fontSize:11,color:C.muted,letterSpacing:"2px",marginBottom:6}}>GYM TRACKER</div>
        <div style={{fontSize:26,fontWeight:800}}>Tu progreso 💪</div>
      </div>
      <div style={{textAlign:"center",background:C.card,border:`2px solid ${A}`,borderRadius:16,padding:"10px 18px"}}>
        <div style={{fontSize:30,fontWeight:900,color:A,fontFamily:"monospace",lineHeight:1}}>{streak}</div>
        <div style={{fontSize:10,color:C.muted,marginTop:2}}>🔥 días</div>
      </div>
    </div>

    {todayRoutines.length>0&&<div style={{padding:"0 20px 8px"}}>
      <Card style={{border:`1px solid ${A}33`}}>
        <div style={{fontSize:11,color:C.muted,letterSpacing:"1px",marginBottom:12}}>HOY · {DAY_NAMES[todayIdx].toUpperCase()}</div>
        {todayRoutines.map(({obj,day,completed})=>(
          <div key={obj.id} onClick={()=>onSelectObjective(obj.id)}
            style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer"}}>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>{obj.name}</div>
              <div style={{fontSize:12,color:A,marginTop:2}}>{day.label||"Sin nombre"} · {day.exercises.length} ej.</div>
            </div>
            <div style={{
              padding:"5px 12px",borderRadius:8,fontSize:11,fontWeight:700,
              background:completed?A:"transparent",
              color:completed?"#111":"#f5a623",
              border:completed?"none":"1px solid #f5a623"
            }}>{completed?"Completado":"Pendiente"}</div>
          </div>
        ))}
      </Card>
    </div>}

    <div style={{padding:"0 20px 8px"}}>
      <Card>
        <div style={{fontSize:11,color:C.muted,letterSpacing:"1px",marginBottom:14}}>ESTA SEMANA · {weekCompletions} rutinas completadas</div>
        <div style={{display:"flex",gap:6,alignItems:"flex-end",height:64}}>
          {last7.map((d,i)=>(
            <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
              <div style={{width:"100%",borderRadius:4,background:d.done?A:C.hi,height:d.done?Math.max(12,Math.round((Math.max(d.completions,d.v?1:0)/Math.max(...last7.map(x=>Math.max(x.completions,1))))*52)):4,transition:"height .3s"}}/>
              <div style={{fontSize:10,color:d.done?A:C.muted,fontWeight:d.done?700:400}}>{d.day}</div>
            </div>
          ))}
        </div>
      </Card>
    </div>

    <div style={{padding:"0 20px 8px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Card style={{marginBottom:0}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:"1px"}}>COMPLETADAS</div>
        <div style={{fontSize:32,fontWeight:900,fontFamily:"monospace",color:A,marginTop:4}}>{data.completions.length}</div>
      </Card>
      <Card style={{marginBottom:0}}>
        <div style={{fontSize:10,color:C.muted,letterSpacing:"1px"}}>SEMANA</div>
        <div style={{fontSize:32,fontWeight:900,fontFamily:"monospace",color:A,marginTop:4}}>{weekCompletions}<span style={{fontSize:14}}>/7</span></div>
      </Card>
    </div>

    {data.objectives.length>0&&<div style={{padding:"0 20px 8px"}}>
      <div style={{fontSize:11,color:C.muted,letterSpacing:"1px",marginBottom:10}}>MIS OBJETIVOS</div>
      {data.objectives.map(obj=>{
        const activeDays=obj.days.filter(d=>d.label||d.exercises.length).length;
        const weekDone=data.completions.filter(c=>c.objectiveId===obj.id&&c.date>=mon&&c.date<=sun).length;
        return <Card key={obj.id} onClick={()=>onSelectObjective(obj.id)} style={{cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontWeight:700,fontSize:15,marginBottom:4}}>{obj.name}</div>
              <div style={{fontSize:12,color:C.muted}}>{weekDone}/{activeDays} esta semana</div>
            </div>
            <div style={{fontSize:18,color:C.muted}}>→</div>
          </div>
        </Card>;
      })}
    </div>}

    <div style={{padding:"0 20px 8px"}}>
      <Btn onClick={onNewWorkout} style={{width:"100%",padding:16,fontSize:16,borderRadius:14}}>
        + Nuevo entrenamiento
      </Btn>
    </div>

    <div style={{padding:"0 20px 16px"}}>
      <Card>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,marginBottom:2}}>Recordatorio diario</div>
            <div style={{fontSize:11,color:C.muted}}>{data.reminder.enabled?"Activo a las "+data.reminder.time:"Desactivado"}</div>
          </div>
          <button onClick={handleToggleReminder}
            style={{width:50,height:28,borderRadius:14,border:"none",cursor:"pointer",position:"relative",
              background:data.reminder.enabled?A:C.hi,transition:"background .2s"}}>
            <div style={{width:22,height:22,borderRadius:11,background:"#fff",position:"absolute",top:3,
              left:data.reminder.enabled?25:3,transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.3)"}}/>
          </button>
        </div>
        {data.reminder.enabled&&(
          <div style={{marginTop:12,display:"flex",alignItems:"center",gap:10}}>
            <label style={{fontSize:11,color:C.muted}}>Hora:</label>
            <input type="time" value={data.reminder.time}
              onChange={e=>onUpdateReminder({...data.reminder,time:e.target.value})}
              style={{background:C.hi,border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px",color:C.text,fontSize:14,outline:"none"}}/>
          </div>
        )}
      </Card>
    </div>
  </div>;
}

/* ── Log ──────────────────────────────────────────────────── */
function LogView({data,onSave,onBack}){
  const [name,setName]=useState("");
  const [exercises,setExercises]=useState([]);
  const [newEx,setNewEx]=useState("");
  const [showSug,setShowSug]=useState(false);
  const known=useMemo(()=>{const s=new Set();data.workouts.forEach(w=>w.exercises.forEach(e=>s.add(e.name)));return[...s];},[data.workouts]);

  const addEx=()=>{if(!newEx.trim())return;setExercises(p=>[...p,{id:gid(),name:newEx.trim(),sets:[{id:gid(),r:10,w:0}]}]);setNewEx("");setShowSug(false);};
  const addSet=exId=>setExercises(p=>p.map(e=>e.id===exId?{...e,sets:[...e.sets,{id:gid(),r:e.sets[e.sets.length-1]?.r||10,w:e.sets[e.sets.length-1]?.w||0}]}:e));
  const delSet=(exId,sId)=>setExercises(p=>p.map(e=>e.id===exId?{...e,sets:e.sets.length>1?e.sets.filter(s=>s.id!==sId):e.sets}:e));
  const updSet=(exId,sId,f,v)=>setExercises(p=>p.map(e=>e.id===exId?{...e,sets:e.sets.map(s=>s.id===sId?{...s,[f]:parseFloat(v)||0}:s)}:e));
  const delEx=exId=>setExercises(p=>p.filter(e=>e.id!==exId));

  const handleSave=()=>{
    if(!exercises.length)return;
    const wo={id:gid(),date:toDay(),name:name.trim()||"Entrenamiento",exercises:exercises.filter(e=>e.name.trim())};
    onSave(wo);
  };

  const sug=newEx?known.filter(n=>n.toLowerCase().includes(newEx.toLowerCase())).slice(0,5):known.slice(0,5);

  return <div>
    <BackHeader onBack={onBack} title="Registrar"/>

    <div style={{padding:"0 20px 12px"}}>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nombre: Push Day, Piernas, etc."
        style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",color:C.text,fontSize:15,outline:"none"}}/>
    </div>

    <div style={{padding:"0 20px"}}>
      {exercises.map((ex)=>(
        <Card key={ex.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontWeight:700,fontSize:15}}>{ex.name}</div>
            <button onClick={()=>delEx(ex.id)} style={{background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>✕</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"32px 1fr 1fr 32px",gap:6,marginBottom:8}}>
            {["#","Reps","Kg",""].map((h,i)=><div key={i} style={{fontSize:10,color:C.muted,textAlign:"center",letterSpacing:"1px"}}>{h}</div>)}
          </div>
          {ex.sets.map((set,i)=>(
            <div key={set.id} style={{display:"grid",gridTemplateColumns:"32px 1fr 1fr 32px",gap:6,marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:A,fontFamily:"monospace",fontWeight:800}}>{i+1}</div>
              <input type="number" min="1" value={set.r} onChange={e=>updSet(ex.id,set.id,"r",e.target.value)}
                style={{background:C.hi,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 6px",color:C.text,fontSize:16,fontFamily:"monospace",fontWeight:700,textAlign:"center",width:"100%",outline:"none"}}/>
              <input type="number" min="0" step="0.5" value={set.w} onChange={e=>updSet(ex.id,set.id,"w",e.target.value)}
                style={{background:C.hi,border:`1px solid ${C.border}`,borderRadius:8,padding:"9px 6px",color:C.text,fontSize:16,fontFamily:"monospace",fontWeight:700,textAlign:"center",width:"100%",outline:"none"}}/>
              <button onClick={()=>delSet(ex.id,set.id)} style={{background:"none",border:"none",color:C.muted,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
            </div>
          ))}
          <button onClick={()=>addSet(ex.id)} style={{marginTop:8,background:"none",border:`1px dashed ${C.border}`,borderRadius:8,padding:"7px",width:"100%",color:C.muted,cursor:"pointer",fontSize:13}}>
            + Serie
          </button>
        </Card>
      ))}
    </div>

    <div style={{padding:"0 20px 8px",position:"relative"}}>
      <div style={{display:"flex",gap:8}}>
        <div style={{flex:1,position:"relative"}}>
          <input value={newEx} onChange={e=>{setNewEx(e.target.value);setShowSug(true);}} onFocus={()=>setShowSug(true)}
            onKeyDown={e=>{if(e.key==="Enter")addEx();if(e.key==="Escape")setShowSug(false);}}
            placeholder="Agregar ejercicio…"
            style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",color:C.text,fontSize:14,outline:"none"}}/>
          {showSug&&sug.length>0&&(
            <div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,background:"#1a1a1a",border:`1px solid ${C.border}`,borderRadius:12,zIndex:20,overflow:"hidden",boxShadow:"0 8px 24px rgba(0,0,0,.8)"}}>
              {sug.map(s=>(
                <div key={s} onMouseDown={e=>{e.preventDefault();setNewEx(s);setShowSug(false);}}
                  style={{padding:"11px 16px",cursor:"pointer",fontSize:13,borderBottom:`1px solid ${C.border}`}}>
                  {s}
                </div>
              ))}
            </div>
          )}
        </div>
        <Btn onClick={addEx} style={{padding:"12px 20px",fontSize:18,borderRadius:12}}>+</Btn>
      </div>
    </div>

    <div style={{padding:"8px 20px 32px"}}>
      <Btn onClick={handleSave} disabled={!exercises.length} style={{width:"100%",padding:15,fontSize:15,borderRadius:14}}>
        ✓ Guardar entrenamiento
      </Btn>
    </div>
  </div>;
}

/* ── History ──────────────────────────────────────────────── */
function HistoryView({data,onDelete,onDeleteAll}){
  const sorted=useMemo(()=>[...data.workouts].sort((a,b)=>b.date.localeCompare(a.date)),[data.workouts]);
  const [confirm,setConfirm]=useState(null);
  const [confirmAll,setConfirmAll]=useState(false);

  if(!sorted.length)return(
    <div style={{padding:"60px 20px",textAlign:"center",color:C.muted}}>
      <div style={{fontSize:48,marginBottom:16}}>🏋️</div>
      <div style={{fontSize:16,fontWeight:600,marginBottom:8,color:C.text}}>Sin entrenamientos aún</div>
      <div style={{fontSize:13}}>Registrá tu primera sesión</div>
    </div>
  );

  return <div>
    <div style={{padding:"24px 20px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontSize:20,fontWeight:800}}>Historial</div>
      {confirmAll?(
        <div style={{display:"flex",gap:6}}>

          <button onClick={()=>setConfirmAll(false)} style={{background:C.hi,border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",color:C.muted,cursor:"pointer",fontSize:12}}>No</button>
        </div>
      ):(
        <Btn onClick={()=>setConfirmAll(true)} variant="danger" style={{padding:"6px 12px",fontSize:11,borderRadius:8}}>Borrar todos</Btn>

              <div style={{fontWeight:700,marginBottom:8,fontSize:15}}>{w.name}</div>
              {w.exercises.map(ex=>(
                <div key={ex.id} style={{fontSize:12,color:C.muted,marginBottom:3}}>
                  {ex.name} · {ex.sets.length} ser · {ex.sets.length?Math.max(...ex.sets.map(s=>s.w)):0}kg máx
                </div>
              ))}
            </div>
            <div style={{textAlign:"right",marginLeft:12,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:10}}>
              <div style={{fontSize:14,fontFamily:"monospace",fontWeight:800,color:A}}>{vol(w).toLocaleString()}kg</div>
              {confirm===w.id?(
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>{onDelete(w.id);setConfirm(null);}} style={{background:C.danger,border:"none",borderRadius:6,padding:"4px 8px",color:"#fff",cursor:"pointer",fontSize:11}}>Borrar</button>
                  <button onClick={()=>setConfirm(null)} style={{background:C.hi,border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 8px",color:C.muted,cursor:"pointer",fontSize:11}}>No</button>
                </div>

              )}
            </div>
          </div>
        </Card>
      ))}
    </div>
  </div>;
}

/* ── Stats ────────────────────────────────────────────────── */
function StatsView({data}){
  const [selEx,setSelEx]=useState("");
  const exNames=useMemo(()=>{const s=new Set();data.workouts.forEach(w=>w.exercises.forEach(e=>s.add(e.name)));return[...s].sort();},[data.workouts]);
  const volData=useMemo(()=>{
    const map={};
    data.workouts.forEach(w=>{if(!map[w.date])map[w.date]=0;map[w.date]+=vol(w);});
    return Object.entries(map).sort(([a],[b])=>a.localeCompare(b)).slice(-20).map(([d,v])=>({d:d.slice(5),v}));
  },[data.workouts]);
  const freqData=useMemo(()=>{
    const map={};
    data.workouts.forEach(w=>w.exercises.forEach(e=>{map[e.name]=(map[e.name]||0)+1;}));
    return Object.entries(map).sort(([,a],[,b])=>b-a).slice(0,8).map(([n,c])=>({n:n.length>14?n.slice(0,14)+"…":n,c}));
  },[data.workouts]);
  const prData=useMemo(()=>{
    if(!selEx)return[];
    return data.workouts.filter(w=>w.exercises.some(e=>e.name===selEx)).sort((a,b)=>a.date.localeCompare(b.date)).map(w=>{
      const ex=w.exercises.find(e=>e.name===selEx);
      return{d:w.date.slice(5),kg:ex.sets.length?Math.max(...ex.sets.map(s=>s.w)):0};
    });
  },[data.workouts,selEx]);
  const prs=useMemo(()=>{
    const m={};
    data.workouts.forEach(w=>w.exercises.forEach(e=>{const mx=e.sets.length?Math.max(...e.sets.map(s=>s.w)):0;if(!m[e.name]||mx>m[e.name])m[e.name]=mx;}));
    return Object.entries(m).sort(([,a],[,b])=>b-a);
  },[data.workouts]);

  if(!data.workouts.length)return(
    <div style={{padding:"60px 20px",textAlign:"center",color:C.muted}}>
      <div style={{fontSize:48,marginBottom:16}}>📊</div>
      <div style={{fontSize:16,fontWeight:600,color:C.text,marginBottom:8}}>Sin datos todavía</div>
      <div style={{fontSize:13}}>Registrá entrenamientos para ver estadísticas</div>
    </div>
  );

  const tt={contentStyle:{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,fontSize:12},labelStyle:{color:C.text}};

  return <div>
    <div style={{padding:"24px 20px 12px",fontSize:20,fontWeight:800}}>Estadísticas</div>

    {volData.length>0&&<div style={{padding:"0 20px 8px"}}>
      <Card>
        <div style={{fontSize:11,color:C.muted,letterSpacing:"1px",marginBottom:14}}>VOLUMEN POR SESIÓN (kg)</div>
        <ResponsiveContainer width="100%" height={170}>
          <LineChart data={volData}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="d" tick={{fontSize:10,fill:C.muted}} tickLine={false}/>
            <YAxis tick={{fontSize:10,fill:C.muted}} tickLine={false} axisLine={false}/>
            <Tooltip {...tt} formatter={v=>[v.toLocaleString()+"kg","Volumen"]}/>
            <Line type="monotone" dataKey="v" stroke={A} strokeWidth={2.5} dot={{fill:A,r:3,strokeWidth:0}}/>
          </LineChart>
        </ResponsiveContainer>
      </Card>
    </div>}

    {freqData.length>0&&<div style={{padding:"0 20px 8px"}}>
      <Card>
        <div style={{fontSize:11,color:C.muted,letterSpacing:"1px",marginBottom:14}}>EJERCICIOS MÁS FRECUENTES</div>
        <ResponsiveContainer width="100%" height={Math.max(150,freqData.length*38)}>
          <BarChart data={freqData} layout="vertical">
            <CartesianGrid strokeDasharray="3 3" stroke={C.border} horizontal={false}/>
            <XAxis type="number" tick={{fontSize:10,fill:C.muted}} tickLine={false}/>
            <YAxis type="category" dataKey="n" tick={{fontSize:11,fill:C.muted}} width={100} tickLine={false} axisLine={false}/>
            <Tooltip {...tt} formatter={v=>[v+" veces","Frecuencia"]}/>
            <Bar dataKey="c" fill={A} radius={[0,5,5,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </Card>
    </div>}

    {exNames.length>0&&<div style={{padding:"0 20px 8px"}}>
      <Card>
        <div style={{fontSize:11,color:C.muted,letterSpacing:"1px",marginBottom:10}}>PROGRESIÓN DE PESO</div>
        <select value={selEx} onChange={e=>setSelEx(e.target.value)}
          style={{width:"100%",background:C.hi,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 14px",color:C.text,fontSize:14,marginBottom:14,outline:"none"}}>
          <option value="">Seleccionar ejercicio…</option>
          {exNames.map(n=><option key={n} value={n}>{n}</option>)}
        </select>
        {prData.length>1?<ResponsiveContainer width="100%" height={170}>
          <LineChart data={prData}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.border}/>
            <XAxis dataKey="d" tick={{fontSize:10,fill:C.muted}} tickLine={false}/>
            <YAxis tick={{fontSize:10,fill:C.muted}} tickLine={false} axisLine={false}/>
            <Tooltip {...tt} formatter={v=>[v+"kg","Máx"]}/>
            <Line type="monotone" dataKey="kg" stroke={A} strokeWidth={2.5} dot={{fill:A,r:4,strokeWidth:0}}/>
          </LineChart>
        </ResponsiveContainer>:selEx&&<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:"20px 0"}}>Necesitás 2+ sesiones con este ejercicio</div>}
      </Card>
    </div>}

    {prs.length>0&&<div style={{padding:"0 20px 24px"}}>
      <Card>
        <div style={{fontSize:11,color:C.muted,letterSpacing:"1px",marginBottom:14}}>🏆 RÉCORDS PERSONALES</div>
        {prs.map(([n,kg])=>(
          <div key={n} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
            <div style={{fontSize:14}}>{n}</div>
            <div style={{fontSize:16,fontFamily:"monospace",fontWeight:900,color:A}}>{kg}kg</div>
          </div>
        ))}
      </Card>
    </div>}
  </div>;
}

    <div style={{padding:"0 20px 8px"}}>

          {objective.days.map((day,idx)=>{

            </div>;
          })}

      </Card>
    </div>

    <div style={{padding:"0 20px"}}>
      {objective.days.map((day,idx)=>{
        const hasContent=day.label||day.exercises.length>0;
        const doneToday=completions.some(c=>c.objectiveId===objective.id&&c.dayIndex===idx&&c.date===today);

              }}>{doneWeek?"✓":idx+1}</div>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:hasContent?C.text:C.muted}}>{DAY_NAMES[idx]}</div>
                {day.label&&<div style={{fontSize:12,color:A,marginTop:2}}>{day.label}</div>}

/* ── Day Routine (Exercises) ─────────────────────────────── */
function DayView({objective,dayIndex,completions,onToggleCompletion,onBack,onUpdate}){
  if(!objective)return null;
  const day=objective.days[dayIndex];
  const today=toDay();
  const isCompleted=completions.some(c=>c.objectiveId===objective.id&&c.dayIndex===dayIndex&&c.date===today);
  const [label,setLabel]=useState(day.label);
  const [exercises,setExercises]=useState(day.exercises);
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({nombre:"",series:3,repeticiones:10,peso:0,descanso:60});
  const saveTimerRef=useRef(null);

  const saveChanges=(newLabel,newExercises)=>{
    if(saveTimerRef.current)clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(()=>{
      const updated={...objective,days:objective.days.map((d,i)=>i===dayIndex?{...d,label:newLabel,exercises:newExercises}:d)};
      onUpdate(updated);
    },500);
  };

  const handleLabelChange=(v)=>{setLabel(v);saveChanges(v,exercises);};

  const addExercise=()=>{
    if(!form.nombre.trim())return;
    const newEx=[...exercises,{id:gid(),nombre:form.nombre.trim(),series:form.series,repeticiones:form.repeticiones,peso:form.peso,descanso:form.descanso}];
    setExercises(newEx);
    saveChanges(label,newEx);
    setForm({nombre:"",series:3,repeticiones:10,peso:0,descanso:60});
    setAdding(false);
  };

  const deleteExercise=(id)=>{
    const newEx=exercises.filter(e=>e.id!==id);
    setExercises(newEx);
    saveChanges(label,newEx);
  };

  const updateExercise=(id,field,value)=>{
    const newEx=exercises.map(e=>e.id===id?{...e,[field]:field==="nombre"?value:(parseFloat(value)||0)}:e);
    setExercises(newEx);
    saveChanges(label,newEx);
  };

  const moveExercise=(idx,dir)=>{
    const newIdx=idx+dir;
    if(newIdx<0||newIdx>=exercises.length)return;
    const newEx=[...exercises];
    [newEx[idx],newEx[newIdx]]=[newEx[newIdx],newEx[idx]];
    setExercises(newEx);
    saveChanges(label,newEx);
  };

  return <div>
    <BackHeader onBack={onBack} title={`Día ${dayIndex+1} · ${DAY_NAMES[dayIndex]}`}/>

    {exercises.length>0&&<div style={{padding:"0 20px 12px"}}>
      <button onClick={()=>onToggleCompletion(objective.id,dayIndex,today)}
        style={{width:"100%",padding:14,borderRadius:14,fontSize:15,fontWeight:700,cursor:"pointer",
          border:isCompleted?"none":`2px solid ${A}`,transition:"all .2s",
          background:isCompleted?A:"transparent",color:isCompleted?"#111":A}}>
        {isCompleted?"✓ Rutina completada hoy":"Marcar como completada"}
      </button>
    </div>}

    <div style={{padding:"0 20px 16px"}}>
      <label style={{fontSize:11,color:C.muted,letterSpacing:"1px",display:"block",marginBottom:6}}>GRUPO MUSCULAR / RUTINA</label>
      <input value={label} onChange={e=>handleLabelChange(e.target.value)}
        placeholder="ej: Espalda - Trícep"
        style={{width:"100%",background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"12px 16px",color:A,fontSize:15,fontWeight:700,outline:"none"}}/>
    </div>

    <div style={{padding:"0 20px"}}>
      {!exercises.length&&!adding&&(
        <div style={{padding:"30px 20px",textAlign:"center",color:C.muted}}>
          <div style={{fontSize:36,marginBottom:12}}>📝</div>
          <div style={{fontSize:14,marginBottom:4}}>Sin ejercicios en este día</div>
          <div style={{fontSize:12}}>Agregá ejercicios para armar la rutina</div>
        </div>
      )}

      {exercises.map((ex,idx)=>(
        <Card key={ex.id}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <input value={ex.nombre} onChange={e=>updateExercise(ex.id,"nombre",e.target.value)}
              style={{background:"transparent",border:"none",color:C.text,fontWeight:700,fontSize:15,outline:"none",flex:1}}/>
            <div style={{display:"flex",gap:4}}>
              {idx>0&&<button onClick={()=>moveExercise(idx,-1)} style={{background:C.hi,border:`1px solid ${C.border}`,borderRadius:6,width:26,height:26,color:C.muted,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button>}
              {idx<exercises.length-1&&<button onClick={()=>moveExercise(idx,1)} style={{background:C.hi,border:`1px solid ${C.border}`,borderRadius:6,width:26,height:26,color:C.muted,cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>↓</button>}
              <button onClick={()=>deleteExercise(ex.id)} style={{background:"none",border:"none",color:C.danger,cursor:"pointer",fontSize:14,padding:"2px 6px"}}>✕</button>
            </div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
            {[
              ["series","Series","1"],
              ["repeticiones","Reps","1"],
              ["peso","Kg","0.5"],
              ["descanso","Desc(s)","5"]
            ].map(([field,lbl,step])=>(
              <div key={field}>
                <label style={{fontSize:9,color:C.muted,letterSpacing:"1px",display:"block",marginBottom:4,textAlign:"center"}}>{lbl}</label>
                <input type="number" min="0" step={step} value={ex[field]}
                  onChange={e=>updateExercise(ex.id,field,e.target.value)}
                  style={{width:"100%",background:C.hi,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 4px",color:C.text,fontSize:16,fontFamily:"monospace",fontWeight:700,textAlign:"center",outline:"none"}}/>
              </div>
            ))}
          </div>
        </Card>
      ))}
    </div>

    {adding?(
      <div style={{padding:"0 20px 20px"}}>
        <Card style={{border:`1px solid ${A}`}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:14,color:A}}>Nuevo ejercicio</div>
          <div style={{marginBottom:12}}>
            <label style={{fontSize:10,color:C.muted,letterSpacing:"1px",display:"block",marginBottom:4}}>NOMBRE</label>
            <input value={form.nombre} onChange={e=>setForm(p=>({...p,nombre:e.target.value}))}
              onKeyDown={e=>{if(e.key==="Enter")addExercise();}}
              placeholder="ej: Press banca, Remo con barra…"
              autoFocus
              style={{width:"100%",background:C.hi,border:`1px solid ${C.border}`,borderRadius:10,padding:"12px 14px",color:C.text,fontSize:14,outline:"none"}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:16}}>
            {[
              ["series","Series",form.series],
              ["repeticiones","Reps",form.repeticiones],
              ["peso","Kg",form.peso],
              ["descanso","Desc(s)",form.descanso]
            ].map(([field,lbl,val])=>(
              <div key={field}>
                <label style={{fontSize:9,color:C.muted,letterSpacing:"1px",display:"block",marginBottom:4,textAlign:"center"}}>{lbl}</label>
                <input type="number" min="0" value={val}
                  onChange={e=>setForm(p=>({...p,[field]:parseFloat(e.target.value)||0}))}
                  style={{width:"100%",background:C.hi,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 4px",color:C.text,fontSize:16,fontFamily:"monospace",fontWeight:700,textAlign:"center",outline:"none"}}/>
              </div>
            ))}
          </div>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={addExercise} disabled={!form.nombre.trim()} style={{flex:1,padding:12,borderRadius:10}}>✓ Agregar</Btn>
            <Btn onClick={()=>setAdding(false)} variant="ghost" style={{padding:12,borderRadius:10}}>Cancelar</Btn>
          </div>
        </Card>
      </div>
    ):(
      <div style={{padding:"8px 20px 32px"}}>
        <Btn onClick={()=>setAdding(true)} style={{width:"100%",padding:14,fontSize:15,borderRadius:14}}>
          + Agregar ejercicio
        </Btn>
      </div>
    )}
  </div>;
}

/* ── App root ─────────────────────────────────────────────── */
function App(){
  const [phase,setPhase]=useState("loading");
  const [data,setData]=useState({...EMPTY_DATA});
  const [view,setView]=useState("home");
  const [syncStatus,setSyncStatus]=useState("idle");
  const [selObjectiveId,setSelObjectiveId]=useState(null);
  const [selDayIndex,setSelDayIndex]=useState(null);
  const [objBackTo,setObjBackTo]=useState("objectives");

  const syncRef=useRef(null);
  const doSync=useCallback((newData)=>{
    if(syncRef.current)clearTimeout(syncRef.current);
    setSyncStatus("syncing");
    syncRef.current=setTimeout(async()=>{
      await fbSave(newData);
      setSyncStatus("ok");
    },1000);
  },[]);

  useEffect(()=>{
    const cfg=FIREBASE_CONFIG;
    initFirebase(cfg).then(async ok=>{
      if(!ok){
        // Firebase falló, arrancar solo con datos locales
        setData(loadLocal());
        setPhase("app");
        return;
      }
      setSyncStatus("syncing");
      const remote=await fbLoad();
      const local=loadLocal();
      if(remote){
        const merged=mergeData(local,remote);
        persist(merged);setData(merged);
      } else {
        setData(local);
        await fbSave(local);
      }
      setSyncStatus("ok");
      setPhase("app");
    });
  },[]);

  const handleSaveWo=async(wo)=>{
    const nd={...data,workouts:[...data.workouts,wo]};
    persist(nd);setData(nd);setView("home");
    doSync(nd);
  };

  const handleDeleteWo=async(id)=>{
    const nd={...data,workouts:data.workouts.filter(w=>w.id!==id)};
    persist(nd);setData(nd);
    doSync(nd);
  };

  const handleDeleteAllWo=async()=>{
    const nd={...data,workouts:[]};
    persist(nd);setData(nd);
    doSync(nd);
  };

  const handleCreateObjective=(name)=>{
    const obj=createEmptyObjective(name);
    const nd={...data,objectives:[...data.objectives,obj]};
    persist(nd);setData(nd);
    doSync(nd);
  };

  const handleUpdateObjective=(updated)=>{
    const nd={...data,objectives:data.objectives.map(o=>o.id===updated.id?updated:o)};
    persist(nd);setData(nd);
    doSync(nd);
  };

  const handleDeleteObjective=(id)=>{
    const nd={...data,objectives:data.objectives.filter(o=>o.id!==id)};
    persist(nd);setData(nd);
    doSync(nd);
  };

  const handleToggleCompletion=(objectiveId,dayIndex,date)=>{
    const exists=data.completions.find(c=>c.objectiveId===objectiveId&&c.dayIndex===dayIndex&&c.date===date);
    const newCompletions=exists
      ?data.completions.filter(c=>c.id!==exists.id)
      :[...data.completions,{id:gid(),objectiveId,dayIndex,date}];
    const nd={...data,completions:newCompletions};
    persist(nd);setData(nd);
    doSync(nd);
  };

  const handleUpdateReminder=(reminder)=>{
    const nd={...data,reminder};
    persist(nd);setData(nd);
    doSync(nd);
  };

  // Reminder notification interval
  const lastFiredRef=useRef("");
  useEffect(()=>{
    const interval=setInterval(()=>{
      if(!data.reminder.enabled)return;
      const now=new Date();
      const hh=String(now.getHours()).padStart(2,"0");
      const mm=String(now.getMinutes()).padStart(2,"0");
      const current=hh+":"+mm;
      const todayStr=toDay();
      if(current===data.reminder.time&&lastFiredRef.current!==todayStr){
        lastFiredRef.current=todayStr;
        const todayIdx=getTodayDayIndex();
        const pending=data.objectives.some(obj=>{
          const day=obj.days[todayIdx];
          if(!day||(!day.label&&!day.exercises.length))return false;
          return!data.completions.some(c=>c.objectiveId===obj.id&&c.dayIndex===todayIdx&&c.date===todayStr);
        });
        if(pending){
          sendNotification("Gym Tracker 💪","Tenés rutinas pendientes para hoy. ¡A entrenar!");
        }
      }
    },30000);
    return()=>clearInterval(interval);
  },[data.reminder,data.objectives,data.completions]);

  if(phase==="loading")return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",flexDirection:"column",gap:16}}>
      <div style={{fontSize:32}}>💪</div>
      <div style={{fontSize:13,color:C.muted}}>Cargando…</div>
    </div>
  );

  const subView=["log","objective","day"].includes(view);
  const nav=[{id:"home",label:"Inicio",ic:"🏠"},{id:"objectives",label:"Objetivos",ic:"🎯"},{id:"history",label:"Historial",ic:"📋"},{id:"stats",label:"Stats",ic:"📊"}];
  const syncIc=syncStatus==="syncing"?"⟳":syncStatus==="ok"?"☁️":"⚠️";

  return <div style={{background:C.bg,minHeight:"100vh",color:C.text,maxWidth:480,margin:"0 auto",paddingBottom:subView?0:76}}>
    {!subView&&<div style={{position:"absolute",top:24,right:20,display:"flex",alignItems:"center",gap:10,zIndex:50}}>
      <div title={syncStatus==="ok"?"Datos sincronizados con Firebase":syncStatus==="syncing"?"Sincronizando…":"Error de sync"} style={{fontSize:16,cursor:"default"}}>{syncIc}</div>
    </div>}

    {view==="home"&&<HomeView data={data} onNewWorkout={()=>setView("log")} onSelectObjective={(id)=>{setSelObjectiveId(id);setObjBackTo("home");setView("objective");}} onUpdateReminder={handleUpdateReminder}/>}
    {view==="log"&&<LogView data={data} onSave={handleSaveWo} onBack={()=>setView("home")}/>}
    {view==="history"&&<HistoryView data={data} onDelete={handleDeleteWo} onDeleteAll={handleDeleteAllWo}/>}
    {view==="stats"&&<StatsView data={data}/>}
    {view==="objectives"&&<ObjectivesView data={data}
      onCreate={handleCreateObjective}
      onSelect={(id)=>{setSelObjectiveId(id);setObjBackTo("objectives");setView("objective");}}
      onDelete={handleDeleteObjective}/>}
    {view==="objective"&&<ObjectiveView
      objective={data.objectives.find(o=>o.id===selObjectiveId)}
      completions={data.completions}
      onBack={()=>setView(objBackTo)}
      onUpdate={handleUpdateObjective}
      onSelectDay={(idx)=>{setSelDayIndex(idx);setView("day");}}/>}
    {view==="day"&&<DayView
      objective={data.objectives.find(o=>o.id===selObjectiveId)}
      dayIndex={selDayIndex}
      completions={data.completions}
      onToggleCompletion={handleToggleCompletion}
      onBack={()=>setView("objective")}
      onUpdate={handleUpdateObjective}/>}

    {!subView&&<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.card,borderTop:`1px solid ${C.border}`,display:"flex",zIndex:100}}>
      {nav.map(item=>(
        <button key={item.id} onClick={()=>setView(item.id)}
          style={{flex:1,padding:"10px 0 14px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
          <span style={{fontSize:20}}>{item.ic}</span>
          <span style={{fontSize:10,fontWeight:view===item.id?800:400,color:view===item.id?A:C.muted}}>{item.label}</span>
          {view===item.id&&<div style={{width:24,height:2,background:A,borderRadius:2}}/>}
        </button>
      ))}
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
